<!-- ══════════════════════════════════════
     TELA 5 — APARELHOS (MODIFICADA)
══════════════════════════════════════ -->
<section id="screen-aparelhos" class="screen hidden">
  <header class="app-header">
    <h2 class="header-title">Aparelhos</h2>
    <button class="toggle-form-btn" id="btn-toggle-form">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </header>

  <div id="form-aparelho-wrap" class="form-wrap hidden">
    <div class="form-card">
      <h3 class="form-title" id="form-aparelho-title">Cadastrar Aparelho</h3>
      <form id="form-aparelho" novalidate>
        
        <!-- CAMPO OCULTO PARA CONTROLE DE EDIÇÃO -->
        <input type="hidden" id="input-id-aparelho" value="" />

        <div class="form-field-group">
          <label class="field-label" for="input-nome-aparelho">Nome do Aparelho *</label>
          <input id="input-nome-aparelho" type="text" placeholder="Ex: Supino Reto" maxlength="60" required autocomplete="off" />
        </div>
        <div class="form-field-group">
          <label class="field-label" for="input-num-aparelho">Nº na Academia *</label>
          <input id="input-num-aparelho" type="text" placeholder="Ex: 14" maxlength="10" required autocomplete="off" />
        </div>
        <div class="form-field-group">
          <label class="field-label">Foto (opcional)</label>
          <label class="file-upload-area" for="foto-aparelho">
            <input id="foto-aparelho" type="file" accept="image/*" capture="environment" />
            <div class="upload-inner">
              <span class="upload-icon" id="upload-icon-label">📷</span>
              <span class="upload-text" id="upload-text-label">Toque para <strong>fotografar</strong></span>
            </div>
          </label>
          <img id="preview-foto" src="" alt="Preview" style="display:none; max-width:100%; height:auto; margin-top:10px; border-radius:8px;" />
          <div id="upload-progress-wrap" class="upload-progress hidden">
            <div class="progress-bar-track"><div class="progress-bar-fill" id="upload-bar" style="width:0%"></div></div>
            <span id="upload-percent" class="upload-pct">0%</span>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="btn-cancel-form">Cancelar</button>
          <button type="submit" class="btn btn-accent" id="btn-submit-aparelho">
            <span id="submit-label">Salvar Aparelho</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="aparelhos-section">
    <div class="aparelhos-search-wrap">
      <input id="aparelhos-search" type="text" placeholder="🔍  Buscar aparelho..." class="search-input" />
    </div>
    <div id="aparelhos-grid" class="aparelhos-grid"></div>
  </div>
</section>
