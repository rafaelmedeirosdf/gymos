<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo com gradiente escuro -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141720"/>
      <stop offset="100%" style="stop-color:#0a0c10"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9ff00"/>
      <stop offset="100%" style="stop-color:#00e5c9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9ff00;stop-opacity:.3"/>
      <stop offset="100%" style="stop-color:#c9ff00;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#c9ff00" flood-opacity="0.4"/>
    </filter>
    <filter id="innerglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Borda sutil -->
  <rect width="512" height="512" rx="112" ry="112" fill="none" stroke="rgba(201,255,0,.15)" stroke-width="2"/>

  <!-- Brilho superior -->
  <ellipse cx="256" cy="60" rx="180" ry="80" fill="url(#glow)" opacity=".6"/>

  <!-- Haltere - barra central -->
  <rect x="176" y="242" width="160" height="28" rx="14" fill="url(#acc)" filter="url(#shadow)"/>

  <!-- Haltere - braço esquerdo externo -->
  <rect x="96" y="220" width="32" height="72" rx="16" fill="url(#acc)" filter="url(#shadow)"/>
  <!-- Haltere - braço esquerdo interno -->
  <rect x="142" y="232" width="40" height="48" rx="12" fill="url(#acc)" opacity=".85"/>

  <!-- Haltere - braço direito externo -->
  <rect x="384" y="220" width="32" height="72" rx="16" fill="url(#acc)" filter="url(#shadow)"/>
  <!-- Haltere - braço direito interno -->
  <rect x="330" y="232" width="40" height="48" rx="12" fill="url(#acc)" opacity=".85"/>

  <!-- Texto GYM -->
  <text x="256" y="178"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="88"
    letter-spacing="-2"
    text-anchor="middle"
    fill="url(#acc)"
    filter="url(#shadow)">GYM</text>

  <!-- Texto OS pequeno -->
  <text x="256" y="390"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="14"
    text-anchor="middle"
    fill="rgba(255,255,255,0.9)">OS</text>

  <!-- Linha decorativa abaixo de OS -->
  <rect x="176" y="402" width="160" height="3" rx="2" fill="url(#acc)" opacity=".6"/>

  <!-- Pontos decorativos nos cantos -->
  <circle cx="88" cy="88" r="6" fill="rgba(201,255,0,.25)"/>
  <circle cx="424" cy="88" r="6" fill="rgba(201,255,0,.25)"/>
  <circle cx="88" cy="424" r="6" fill="rgba(0,229,201,.25)"/>
  <circle cx="424" cy="424" r="6" fill="rgba(0,229,201,.25)"/>
</svg>
